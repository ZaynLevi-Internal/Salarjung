<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Museum Guide</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <h1>🏛 Smart Museum Guide</h1>

    <p class="subtitle">
      Walk near exhibits to hear audio automatically
    </p>

    <button id="startBtn">
      Start Museum Guide
    </button>

    <div class="card">

      <h2>Status</h2>

      <p id="status">
        Waiting to start...
      </p>

      <h2>Current Exhibit</h2>

      <p id="exhibit">
        None
      </p>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
